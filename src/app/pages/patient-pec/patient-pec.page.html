<ion-header [translucent]="true">
  <ion-toolbar color="primary" style="--background: #3879f7;">

    <!-- Bouton retour -->
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/" color="light"></ion-back-button>
    </ion-buttons>

    <!-- Titre avec logo -->
    <ion-title>
      <div style="display:flex; align-items:center;">
        <img
          src="../../../assets/455316869_122110964966444394_7713516157255301446_n.jpg"
          alt="Logo" style="height:28px; margin-right:10px;">
        <span style="color:#ffe94f; font-weight:bold;">Patient pris en charge</span>
      </div>
    </ion-title>

  </ion-toolbar>
</ion-header>
<ion-content class="ion-padding" class="custom-background">

  <!-- Barre de recherche -->
  <ion-searchbar placeholder="Rechercher un patient" [(ngModel)]="searchText" debounce="300">
  </ion-searchbar>

  <ion-grid>
    <ion-row *ngFor="let patient of filteredPatients()">
      <ion-col size="12">
        <ion-card class="card-patient" [routerLink]="['/edit-constant']" [state]="{ data: patient }">
          <ion-card-header>
            <ion-card-title>
              {{ patient.nom }} {{ patient.prenom }}
            </ion-card-title>
            <ion-card-subtitle>
              {{ patient.entreprise }}
            </ion-card-subtitle>
          </ion-card-header>
          <ion-card-content>
            Heure d'arrivée: 
            <ion-badge [color]="patient.statut === 'attente' ? 'danger' : 'success'">
              {{ patient.heure_recep }} </ion-badge>
          </ion-card-content>
        </ion-card>
      </ion-col>
    </ion-row>
  </ion-grid>

</ion-content>
