<ion-content class="login-page" fullscreen class="custom-background">
  <div class="d-flex align-items-center justify-content-center min-vh-100">
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-6 col-lg-4">

          <!-- Carte de login -->
          <div class="card shadow-lg p-4 rounded-4">

            <!-- Logo -->
            <div class="text-center mb-4">
              <img src="../../../assets/455316869_122110964966444394_7713516157255301446_n.jpg" alt="Logo Entreprise" class="img-fluid" style="max-width: 120px;">
            </div>

            <!-- Titre -->
            <!-- Formulaire -->
            <form (ngSubmit)="onLogin()">

              <div class="form-floating mb-3">
                <input [(ngModel)]="email" name="email" type="email" id="email" class="form-control" placeholder="Email"
                  required>
                <label for="email">Email</label>
              </div>

              <div class="form-floating mb-3">
                <input [(ngModel)]="password" name="password" type="password" id="password" class="form-control"
                  placeholder="Mot de passe" required>
                <label for="password">Mot de passe</label>
              </div>

              <button type="submit" class="btn btn-primary w-100">
                Se connecter
              </button>

              <div class="text-center mt-3">
                <a href="#">Mot de passe oublié ?</a>
              </div>

            </form>

          </div>

        </div>
      </div>
    </div>
  </div>
</ion-content>
